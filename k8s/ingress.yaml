apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: review-dashboard
  labels:
    app: review-dashboard
spec:
  rules:
    - host: review-dashboard.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: review-dashboard
                port:
                  number: 80